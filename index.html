    <script>
      (function () {
        var RECOVERY_KEY = 'app-boot-recovery-v1';

        async function cleanupAndReload(reason) {
          var attempts = parseInt(sessionStorage.getItem(RECOVERY_KEY) || '0', 10);
          if (attempts >= 2) {
            console.error('App boot recovery exhausted after 2 attempts:', reason);
            return;
          }

          sessionStorage.setItem(RECOVERY_KEY, String(attempts + 1));

          try {
            if ('serviceWorker' in navigator) {
              var registrations = [];
              if (typeof navigator.serviceWorker.getRegistrations === 'function') {
                registrations = await navigator.serviceWorker.getRegistrations();
              } else {
                var registration = await navigator.serviceWorker.getRegistration();
                registrations = registration ? [registration] : [];
              }

              await Promise.all(
                registrations.map(function (registration) {
                  return registration.unregister();
                }),
              );
            }

            if ('caches' in window) {
              var cacheKeys = await caches.keys();
              await Promise.all(
                cacheKeys.map(function (key) {
                  return caches.delete(key);
                }),
              );
            }
          } catch (error) {
            console.warn('Failed to clear stale client state during app boot recovery', error);
          }

          var url = new URL(window.location.href);
          url.searchParams.set('_app_recover', Date.now().toString());
          window.location.replace(url.toString());
        }

        window.__globleRecoverFromBootFailure = cleanupAndReload;

        // Boot timeout: if the app hasn't signalled successful boot
        // within 10s, assume a stale-asset failure and recover.
        var attempts = parseInt(sessionStorage.getItem(RECOVERY_KEY) || '0', 10);
        if (attempts < 2) {
          window.__globleBootTimer = setTimeout(function () {
            cleanupAndReload('boot-timeout');
          }, 10000);
        }

        window.addEventListener('error', function (event) {
          var message = event && event.message ? String(event.message) : '';
          if (
            message.includes('Failed to load module script') ||
            message.includes('Importing a module script failed')
          ) {
            void cleanupAndReload(message);
          }
        });

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason ? String(event.reason.message || event.reason) : '';
          if (
            reason.includes('Failed to load module script') ||
            reason.includes('Failed to fetch dynamically imported module') ||
            reason.includes('Importing a module script failed')
          ) {
            void cleanupAndReload(reason);
          }
        });
      })();
    </script>
